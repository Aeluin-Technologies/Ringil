syntax = "proto3";

package ringil;

message DetectionEvent {
  uint64 timestamp = 1;
  string detector_id = 2;
  string type = 3;
  double x = 4;
  double y = 5;
  double z = 6;
  double confidence = 7;
}

message ConsensusAction {
  uint64 timestamp = 1;
  string sender_id = 2;
  string action_type = 3;
  repeated double params = 4;
}

message DroneMessage {
  oneof payload {
    DetectionEvent detection = 1;
    ConsensusAction consensus = 2;
  }
}
