name: nix

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
            github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check flakes
        run: |
          nix flake check --impure

      - name: Evaluate dev configuration
        run: |
          nix-instantiate --eval -E '(builtins.getFlake (toString ./.)).nixosConfigurations.dev-drone.config.system.build.toplevel' --impure

      - name: Evaluate prod-swarm configuration
        run: |
          nix-instantiate --eval -E '(builtins.getFlake (toString ./.)).nixosConfigurations.prod-swarm.config.system.build.toplevel' --impure
